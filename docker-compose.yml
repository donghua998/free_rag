version: '3.8'

services:
  # etcd（Milvus依赖）
  kb-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: kb-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - kb_etcd_data:/etcd
    command: etcd -advertise-client-urls http://127.0.0.1:22379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "22379:2379"
    networks:
      - kb-network

  # MinIO（Milvus依赖）
  kb-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: kb-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - kb_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - kb-network

  # Milvus 向量数据库
  kb-milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: kb-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: kb-etcd:2379
      MINIO_ADDRESS: kb-minio:9000
    ports:
      - "29530:19530"
      - "29091:9091"
    volumes:
      - kb_milvus_data:/var/lib/milvus
    networks:
      - kb-network
    depends_on:
      - kb-etcd
      - kb-minio

volumes:
  kb_etcd_data:
  kb_minio_data:
  kb_milvus_data:

networks:
  kb-network:
    driver: bridge